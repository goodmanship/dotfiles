# Goodmanship's Zephyr config #

add_newline = false

# A minimal left prompt
format = """$python$directory${custom.git_branch}$git_status$git_state $character"""

# move the rest of the prompt to the right
#right_format = """$status$git_branch${custom.git_status_dirty}$git_status"""
right_format = """$status$cmd_duration"""

palette="wombat"

# Define custom colors
[palettes.tokyo_night]
black = '#15161e'
blue = '#7aa2f7'
cyan = '#7dcfff'
green = '#9ece6a'
orange = '#ff9e64'
purple = '#bb9af7'
red = '#f7768e'
white = '#a9b1d6'
yellow = '#e0af68'

[palettes.tokyo_night_256]
black = '16'
blue = '111'
cyan = '117'
green = '149'
orange = '215'
purple = '141'
red = '210'
white = '146'
yellow = '179'

[palettes.wombat]
black = '#000000'
blue = '#5da9f6'
cyan = '#82fff7'
green = '#b1e969'
orange = '#ff9470'
purple = '#e86aff'
red = '#ff615a'
white = '#dedacf'
yellow = '#ebd99c'

[palettes.wombat_256]
black = '0'
blue = '75'
cyan = '123'
green = '149'
orange = '209'
purple = '171'
red = '203'
white = '188'
yellow = '223'

[character]
success_symbol = "[❯](purple)[❯](cyan)"
error_symbol = "[❯](yellow)[❯](red)"

[python]
format = '[(\($virtualenv\) )]($style)'
style = 'white'

[directory]
style = "blue"
truncation_length = 1
truncation_symbol = ""
fish_style_pwd_dir_length = 1

[git_branch]
disabled = true

[git_commit]
disabled = true

[git_state]
disabled = true

[git_status]
format = '( [\[$ahead_behind$stashed\]]($style))'
style = "cyan"
stashed = "≡"
ahead = "⇡${count}"
behind = "⇣${count}"

# Single git branch module - runs git status once, color-codes by state
# green = clean, yellow = staged only, orange = unstaged changes
# Wombat palette RGB values used for 24-bit ANSI color output
[custom.git_branch]
when = 'git rev-parse --git-dir >/dev/null 2>&1'
command = '''
branch=$(git branch --show-current 2>/dev/null)
[ -z "$branch" ] && branch="➦ $(git rev-parse --short HEAD 2>/dev/null)"
porcelain=$(git status --porcelain 2>/dev/null)
if [ -z "$porcelain" ]; then
  R=177 G=233 B=105
elif printf '%s' "$porcelain" | grep -qE '^.[^ ]'; then
  R=255 G=148 B=112
else
  R=235 G=217 B=156
fi
LC=$(printf '\356\202\266')
RC=$(printf '\356\202\264')
printf '\033[38;2;%d;%d;%dm%s\033[48;2;%d;%d;%dm\033[38;2;0;0;0m\033[1m %s \033[0m\033[38;2;%d;%d;%dm%s\033[0m' \
  $R $G $B "$LC" $R $G $B "$branch" $R $G $B "$RC"
'''
format = '$output'
shell = ["sh"]

[cmd_duration]
format = ' [$duration]($style)'

[status]
disabled = false
symbol = ' ✘'
